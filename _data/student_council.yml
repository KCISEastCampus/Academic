# Student Council Data
# A-level Student Council (ALSC) - Managing IGCSE and A-level students

# Council Information
council:
  name: "A-level Student Council"
  short_name: "ALSC"
  description: "The A-level Student Council (ALSC) aims to organize activities, provide resources, help students relieve stress, and help them learn effectively."

# Core Members / Executive Team
executives:
  - name: "Eric Shi"
    role: "Core"
    grade: "G11"
    class: "11I"
    bio: "From G11, with experience of leadership by being the class monitor for 3 years, since G8. Built and maintaining <a href=\"https://kcisec.site\">https://kcisec.site</a> since 2022."
    groups:
      - name: "Academic"
        role: "Leader"
      - name: "Publicity"
        role: "Deputy Leader"

  - name: "Marcia Ma"
    role: "Core"
