<footer class="mw-footer" role="contentinfo">
    <div class="mw-footer-container">
        <div class="mw-footer-row">
            <div class="mw-footer-left">
                <p class="mw-footer-text">
                    &copy;
                    <script>
                        document.write(new Date().getFullYear());
                    </script>
                    EricStoneChina &amp; A-Level Student Council
                </p>
            </div>
            <div class="mw-footer-right">
                <a class="mw-footer-link" href="/contributors/">Contributors</a>
                <span class="mw-footer-sep" aria-hidden="true">·</span>
                <img
                    id="hitscounter-badge"
                    src="https://hitscounter.dev/api/hit?url=academic.kcisec.site&label=Academic&icon=brilliance&color=%23198754&message=&style=flat&tz=Asia/Hong_Kong"
                    alt="Page views"
                    style="
                        max-width: 200px;
                        width: auto;
                        height: auto;
                        vertical-align: middle;
                    "
                />
                <script>
                    (function () {
                        var badge =
                            document.getElementById("hitscounter-badge");
                        if (!badge) return;
                        var currentUrl = new URL(window.location.href);
                        var pageLabel =
                            "{{ page.title | default: site.title | default: 'Academic' | escape }}";
                        currentUrl.hash = "";
                        var isHomePage =
                            currentUrl.pathname === "/" ||
                            currentUrl.pathname === "/index.html";
                        var counterUrl = isHomePage
                            ? "academic.kcisec.site"
                            : currentUrl.toString();
                        var counterLabel = isHomePage ? "Academic" : pageLabel;
                        var api = new URL("https://hitscounter.dev/api/hit");
                        api.searchParams.set("url", counterUrl);
                        api.searchParams.set("label", counterLabel);
                        api.searchParams.set("icon", "brilliance");
                        api.searchParams.set("color", "#198754");
                        api.searchParams.set("message", "");
                        api.searchParams.set("style", "flat");
                        api.searchParams.set("tz", "Asia/Hong_Kong");
                        badge.src = api.toString();
                    })();
                </script>
            </div>
        </div>
    </div>
</footer>
