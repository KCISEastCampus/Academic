<!-- Immediately apply saved theme to avoid flash: reads localStorage before paint -->
<script>
    try {
        (function () {
            var t = localStorage.getItem("site-theme");
            if (t) {
                document.documentElement.setAttribute("data-bs-theme", t);
            } else {
                var s = window.matchMedia("(prefers-color-scheme: dark)")
                    .matches
                    ? "dark"
                    : "light";
                document.documentElement.setAttribute("data-bs-theme", s);
            }
        })();
    } catch (e) {
        /* ignore */
    }
</script>

<!-- Bootstrap JS: Load asynchronously after DOM ready - with CDN fallback -->
<script>
    window.loadBootstrapJS = function () {
        if (window.bootstrap) return;

        const script = document.createElement("script");
        script.crossOrigin = "anonymous";
        script.onerror = function () {
            const fallbackScript = document.createElement("script");
            fallbackScript.src =
                "https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js";
            fallbackScript.crossOrigin = "anonymous";
            fallbackScript.onerror = function () {
                const secondScript = document.createElement("script");
                secondScript.src =
                    "https://cdn.staticfile.net/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js";
                secondScript.crossOrigin = "anonymous";
                secondScript.onerror = function () {
                    const thirdScript = document.createElement("script");
                    thirdScript.src =
                        "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js";
                    thirdScript.crossOrigin = "anonymous";
                    document.head.appendChild(thirdScript);
                };
                document.head.appendChild(secondScript);
            };
            document.head.appendChild(fallbackScript);
        };

        script.src =
            "/assets/vendor/bootstrap/5.3.3/js/bootstrap.bundle.min.js";
        document.head.appendChild(script);
    };
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(window.loadBootstrapJS, 100);

        if (window.mermaid && window.mermaid.initialize) {
            try {
                window.mermaid.initialize({
                    startOnLoad: false,
                    theme: "dark",
                });
                window.mermaid.init(
                    undefined,
                    document.querySelectorAll(".language-mermaid"),
                );
            } catch (e) {
                // Silently fail if mermaid initialization fails
            }
        }
    });
</script>
