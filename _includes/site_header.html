<!-- _includes/site_header.html -->
<!-- Wikipedia-style site header -->
<!-- Usage: include site_header.html title="Page Title" subtitle="Page subtitle" -->

<header class="mw-header" role="banner">
    <!-- Left: logo + site title -->
    <div class="vector-header-start">
        <a href="/" class="mw-logo" aria-label="Homepage">
            <img
                src="https://www.kcisec.site/assets/images/school-logo.svg"
                alt="KangChiao International School East Campus"
                class="mw-logo-icon"
            />
        </a>
        <div class="mw-logo-container">
            <p class="site-title">
                <a href="/"
                    >{{ include.title | default: "A-Level Homepage" }}</a
                >
            </p>
            {% if include.subtitle %}
            <span class="site-subtitle">{{ include.subtitle }}</span>
            {% endif %}
        </div>
    </div>

    <!-- Centre: search box -->
    <div class="vector-search-box">
        <div class="vector-search-box-form">
            <i
                class="bi bi-search vector-search-box-icon"
                aria-hidden="true"
            ></i>
            <input
                type="text"
                id="search-input"
                class="vector-search-box-input"
                placeholder="Search topics…"
                aria-label="Search"
                data-search-source="{{ '/assets/search.json' | relative_url }}"
            />
        </div>
        <div
            id="search-results"
            class="vector-search-box-results"
            style="display: none"
            aria-live="polite"
        ></div>
    </div>

    <div class="vector-header-end">
        {% include theme_button.html mode="inline" %}
    </div>
</header>
