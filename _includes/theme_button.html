{% assign theme_toggle_mode = include.mode | default: "floating" %}
<button
    id="theme_button"
    class="theme-toggle-btn theme-toggle-{{ theme_toggle_mode }}"
    data-theme-toggle-mode="{{ theme_toggle_mode }}"
    aria-label="Toggle theme"
>
    <i class="bi bi-sun theme-icon"></i>
    <span class="theme-label">Light</span>
</button>

<style>
    .theme-toggle-btn {
        background: var(--background-primary);
        border: 1px solid var(--border-base);
        border-radius: 999px;
        padding: 8px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-base);
        transition:
            background var(--transition-fast) var(--transition-ease),
            border-color var(--transition-fast) var(--transition-ease),
            color var(--transition-fast) var(--transition-ease),
            transform var(--transition-fast) var(--transition-ease),
            box-shadow var(--transition-fast) var(--transition-ease);
    }

    .theme-toggle-btn:hover {
        background: var(--background-color-interactive-subtle);
        border-color: var(--color-progressive);
        color: var(--color-progressive);
        transform: translateY(-1px);
    }

    .theme-toggle-btn:active {
        transform: translateY(0);
    }

    .theme-icon {
        font-size: 1rem;
        transition: transform 0.3s ease;
    }

    .theme-toggle-btn:hover .theme-icon {
        transform: rotate(12deg);
    }

    .theme-label {
        font-size: 0.85rem;
        line-height: 1;
    }

    .theme-toggle-floating {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(10px);
    }

    .theme-toggle-inline {
        position: static;
        z-index: auto;
        box-shadow: none;
        backdrop-filter: none;
    }

    .vector-header-end .theme-toggle-inline {
        margin-left: auto;
    }

    /* Mobile responsive */
    @media (max-width: 1024px) {
        .theme-toggle-floating {
            right: 90px;
        }
    }

    @media (max-width: 768px) {
        .theme-toggle-floating {
            top: 15px;
            right: 88px;
            padding: 0;
            font-size: 0.8rem;
            width: 46px;
            height: 46px;
            justify-content: center;
            gap: 0;
        }

        .theme-toggle-floating .theme-icon {
            font-size: 1rem;
        }

        .theme-toggle-floating .theme-label,
        .theme-toggle-inline .theme-label {
            display: none;
        }

        .theme-toggle-floating {
            border-radius: 50%;
        }

        .theme-toggle-inline {
            padding: 8px 10px;
        }
    }

    @media (max-width: 540px) {
        .theme-toggle-floating {
            right: 82px;
        }
    }

    /* Respect prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
        .theme-icon {
            transition: none;
        }

        .theme-toggle-btn {
            transition: none;
        }

        .theme-toggle-btn:hover {
            transform: none;
        }

        .theme-toggle-btn:active {
            transform: none;
        }
    }
</style>

<!-- Load theme toggle JavaScript -->
<script defer src="/assets/js/theme_toggle.js"></script>
